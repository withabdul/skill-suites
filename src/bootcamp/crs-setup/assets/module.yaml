code: crs
name: "Courses & Bootcamp Suite"
description: "Comprehensive suite for course architecture, instructor guidelines, and bootcamp management using PDLC methodology."
module_version: 1.0.0
default_selected: false
module_greeting: >
  🎓 Courses & Bootcamp Suite is ready! Your 9-agent team is installed and waiting.
  Run any agent to start — or use crs-agent-manager to kick off a full PDLC workflow.
  Run this setup again anytime to reconfigure settings.

  For questions, suggestions and support — reach out to the module author.

crs_output_folder:
  prompt: "Where is the bootcamp output root folder stored? (Outputs will be written under: {crs_output_folder}/{active-project}/...)"
  default: "{project-root}/.ssconfig-output"
  result: "{value}"
  user_setting: false

crs_language:
  prompt: "What is the primary language used for the material?"
  default: "English"
  user_setting: false
  result: "{value}"


agents:
  - code: agent-manager
    name: ""
    title: "Course Orchestrator"
    icon: "🎯"
    description: "Coordinate end-to-end course creation through PDLC."
  - code: agent-consultant
    name: ""
    title: "Course Consultant"
    icon: "🔍"
    description: "Uncover and lock course vision through critical deep-dive questioning."
  - code: agent-researcher
    name: ""
    title: "Technical Researcher"
    icon: "📚"
    description: "Validated technical research and audience analysis for course creation."
  - code: agent-architect
    name: ""
    title: "Curriculum Architect"
    icon: "🏗️"
    description: "Build syllabus, timeline, and mini-project design for course creation."
  - code: agent-theory-writer
    name: ""
    title: "Theory Writer"
    icon: "✍️"
    description: "Write course text material adapted to audience level and preferred style."
  - code: agent-code-smith
    name: ""
    title: "Course Code Smith"
    icon: "🔧"
    description: "Create coding exercises, environment scaffolding, and clean, runnable debugging scenarios."
  - code: agent-engagement
    name: ""
    title: "Course Engagement Architect"
    icon: "💡"
    description: "Design retention strategies, Aha! moments, and engagement triggers for course material."
  - code: agent-simulator
    name: ""
    title: "Course Simulator"
    icon: "🪞"
    description: "Audit course material quality through student simulations with various extreme personas."
  - code: agent-delivery
    name: ""
    title: "Course Delivery Coach"
    icon: "🎤"
    description: "Develop instructor delivery guides and presentation slide structure so technical material is not intimidating."
